<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Raycaster Dungeon</title>
<style>
body { margin: 0; overflow: hidden; background: black; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const W = canvas.width;
const H = canvas.height;

const FOV = Math.PI / 3;
const MAX_DEPTH = 20;

const player = {
    x: 2,
    y: 2,
    angle: 0,
    moveSpeed: 0.06,
    rotSpeed: 0.04
};

// ---------------- INPUT ----------------
const keys = {};
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

// ---------------- DUNGEON GENERATION ----------------
function createMap(w, h) {
    let map = Array.from({ length: h }, () =>
        Array.from({ length: w }, () => 1)
    );

    function carveRoom(x, y, rw, rh) {
        for (let i = y; i < y + rh; i++) {
            for (let j = x; j < x + rw; j++) {
                if (i > 1 && j > 1 && i < h-2 && j < w-2) {
                    map[i][j] = 0;
                }
            }
        }
    }

    function carveCorridor(x1, y1, x2, y2) {
        while (x1 !== x2) {
            map[y1][x1] = 0;
            x1 += x1 < x2 ? 1 : -1;
        }
        while (y1 !== y2) {
            map[y1][x1] = 0;
            y1 += y1 < y2 ? 1 : -1;
        }
    }

    let rooms = [];

    for (let i = 0; i < 6; i++) {
        let rw = 4 + Math.floor(Math.random() * 6);
        let rh = 4 + Math.floor(Math.random() * 6);

        let x = 2 + Math.floor(Math.random() * (w - rw - 4));
        let y = 2 + Math.floor(Math.random() * (h - rh - 4));

        carveRoom(x, y, rw, rh);

        let cx = x + Math.floor(rw / 2);
        let cy = y + Math.floor(rh / 2);

        rooms.push({ cx, cy });
    }

    for (let i = 1; i < rooms.length; i++) {
        let a = rooms[i - 1];
        let b = rooms[i];
        carveCorridor(a.cx, a.cy, b.cx, b.cy);
    }

    return map;
}

const map = createMap(30, 30);

// spawn in open area
player.x = 4;
player.y = 4;

// ---------------- COLLISION ----------------
function isWall(x, y) {
    if (x < 0 || y < 0 || x >= map[0].length || y >= map.length) return true;
    return map[Math.floor(y)][Math.floor(x)] === 1;
}

// ---------------- RAYCAST (DDA) ----------------
function castRay(angle) {
    let rayX = player.x;
    let rayY = player.y;

    let sin = Math.sin(angle);
    let cos = Math.cos(angle);

    for (let i = 0; i < MAX_DEPTH * 25; i++) {
        rayX += cos * 0.04;
        rayY += sin * 0.04;

        if (isWall(rayX, rayY)) {
            let dist = Math.hypot(rayX - player.x, rayY - player.y);

            // fish-eye correction
            dist *= Math.cos(angle - player.angle);

            return dist;
        }
    }
    return MAX_DEPTH;
}

// ---------------- MOVEMENT ----------------
function update() {
    if (keys["ArrowLeft"]) player.angle -= player.rotSpeed;
    if (keys["ArrowRight"]) player.angle += player.rotSpeed;

    let dx = Math.cos(player.angle) * player.moveSpeed;
    let dy = Math.sin(player.angle) * player.moveSpeed;

    if (keys["w"]) {
        if (!isWall(player.x + dx, player.y)) player.x += dx;
        if (!isWall(player.x, player.y + dy)) player.y += dy;
    }

    if (keys["s"]) {
        if (!isWall(player.x - dx, player.y)) player.x -= dx;
        if (!isWall(player.x, player.y - dy)) player.y -= dy;
    }
}

// ---------------- RENDER ----------------
function render() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, W, H);

    for (let x = 0; x < W; x++) {
        let rayAngle = player.angle - FOV / 2 + (x / W) * FOV;
        let dist = castRay(rayAngle);

        let wallHeight = H / dist;

        // FLASHLIGHT CONE EFFECT
        let angleDiff = Math.abs(rayAngle - player.angle);
        let cone = Math.max(0, 1 - angleDiff / (FOV / 2));

        // distance lighting
        let light = Math.max(0, 255 - dist * 30);

        let brightness = light * cone;

        ctx.fillStyle = `rgb(${brightness},${brightness},${brightness})`;

        ctx.fillRect(
            x,
            (H / 2) - wallHeight / 2,
            1,
            wallHeight
        );
    }
}

// ---------------- LOOP ----------------
function loop() {
    update();
    render();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
