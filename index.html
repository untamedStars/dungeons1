<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Raycaster Fixed</title>
<style>
body { margin: 0; overflow: hidden; background: black; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const W = canvas.width;
const H = canvas.height;

const FOV = Math.PI / 3;
const MAX_DEPTH = 20;

const player = {
    x: 4,
    y: 4,
    angle: 0,
    moveSpeed: 0.06,
    rotSpeed: 0.04
};

// ---------------- MAP ----------------
function createMap(w, h) {
    let map = Array.from({ length: h }, () =>
        Array.from({ length: w }, () => 1)
    );

    function carveRoom(x, y, rw, rh) {
        for (let i = y; i < y + rh; i++) {
            for (let j = x; j < x + rw; j++) {
                if (i > 1 && j > 1 && i < h-2 && j < w-2) {
                    map[i][j] = 0;
                }
            }
        }
    }

    function carveCorridor(x1, y1, x2, y2) {
        while (x1 !== x2) {
            map[y1][x1] = 0;
            x1 += x1 < x2 ? 1 : -1;
        }
        while (y1 !== y2) {
            map[y1][x1] = 0;
            y1 += y1 < y2 ? 1 : -1;
        }
    }

    let rooms = [];

    for (let i = 0; i < 6; i++) {
        let rw = 4 + Math.random() * 5;
        let rh = 4 + Math.random() * 5;

        let x = 2 + Math.random() * (w - rw - 4);
        let y = 2 + Math.random() * (h - rh - 4);

        x = Math.floor(x);
        y = Math.floor(y);
        rw = Math.floor(rw);
        rh = Math.floor(rh);

        carveRoom(x, y, rw, rh);

        rooms.push({
            cx: x + Math.floor(rw / 2),
            cy: y + Math.floor(rh / 2)
        });
    }

    for (let i = 1; i < rooms.length; i++) {
        let a = rooms[i - 1];
        let b = rooms[i];
        carveCorridor(a.cx, a.cy, b.cx, b.cy);
    }

    return map;
}

const map = createMap(30, 30);

// ---------------- COLLISION ----------------
function isWall(x, y) {
    if (x < 0 || y < 0 || x >= map[0].length || y >= map.length) return true;
    return map[Math.floor(y)][Math.floor(x)] === 1;
}

// ---------------- RAYCAST ----------------
function castRay(angle) {
    let step = 0.05;

    let rayX = player.x;
    let rayY = player.y;

    let cos = Math.cos(angle);
    let sin = Math.sin(angle);

    for (let i = 0; i < MAX_DEPTH / step; i++) {
        rayX += cos * step;
        rayY += sin * step;

        if (isWall(rayX, rayY)) {
            let dist = Math.hypot(rayX - player.x, rayY - player.y);

            // fix fisheye
            dist *= Math.cos(angle - player.angle);

            return dist;
        }
    }
    return MAX_DEPTH;
}

// ---------------- INPUT ----------------
const keys = {};
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

// ---------------- UPDATE ----------------
function update() {
    if (keys["ArrowLeft"]) player.angle -= player.rotSpeed;
    if (keys["ArrowRight"]) player.angle += player.rotSpeed;

    let dx = Math.cos(player.angle) * player.moveSpeed;
    let dy = Math.sin(player.angle) * player.moveSpeed;

    if (keys["w"]) {
        if (!isWall(player.x + dx, player.y)) player.x += dx;
        if (!isWall(player.x, player.y + dy)) player.y += dy;
    }
    if (keys["s"]) {
        if (!isWall(player.x - dx, player.y)) player.x -= dx;
        if (!isWall(player.x, player.y - dy)) player.y -= dy;
    }
}

// ---------------- RENDER ----------------
function render() {
    // SKY
    ctx.fillStyle = "#111";
    ctx.fillRect(0, 0, W, H/2);

    // FLOOR
    ctx.fillStyle = "#050505";
    ctx.fillRect(0, H/2, W, H/2);

    for (let x = 0; x < W; x++) {
        let rayAngle = player.angle - FOV/2 + (x / W) * FOV;
        let dist = castRay(rayAngle);

        let wallHeight = H / (dist + 0.0001);

        // FLASHLIGHT CONE
        let angleDiff = Math.abs(rayAngle - player.angle);
        let cone = 1 - (angleDiff / (FOV / 2));
        cone = Math.max(0, cone);

        // distance shading (IMPORTANT FIX)
        let shade = 255 / (1 + dist * dist * 0.15);
        shade *= cone;

        shade = Math.max(0, Math.min(255, shade));

        ctx.fillStyle = `rgb(${shade},${shade},${shade})`;

        ctx.fillRect(
            x,
            (H/2) - wallHeight/2,
            1,
            wallHeight
        );
    }
}

// ---------------- LOOP ----------------
function loop() {
    update();
    render();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
